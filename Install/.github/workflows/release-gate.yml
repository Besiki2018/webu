# Release Gate — lint, typecheck, unit, build, audits; uploads audit/ci artifacts.
# Deployment should run only when this workflow succeeds (e.g. branch protection).
name: Release Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

defaults:
  run:
    working-directory: Install

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite

      - name: Get Composer cache
        uses: actions/cache@v4
        with:
          path: Install/vendor
          key: composer-${{ hashFiles('Install/composer.lock') }}

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Install/package-lock.json

      - name: Install NPM deps
        run: npm ci

      - name: Run release gate
        run: npm run release:gate

      - name: Upload audit/ci artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-gate-audit-${{ github.run_id }}
          path: Install/audit/ci/
          retention-days: 14
