# CI: lint, test, build, security audit
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: Install

jobs:
  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite
          coverage: none
      - name: Get Composer cache
        uses: actions/cache@v4
        with:
          path: Install/vendor
          key: composer-${{ hashFiles('Install/composer.lock') }}
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist
      - name: PHP CS / Lint
        run: composer run lint 2>/dev/null || true
      - name: PHPStan (if present)
        run: composer run phpstan 2>/dev/null || true

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Install/package-lock.json
      - name: Install NPM deps
        working-directory: Install
        run: npm ci
      - name: TypeScript check
        working-directory: Install
        run: npm run typecheck 2>/dev/null || true
      - name: ESLint (if present)
        working-directory: Install
        run: npm run lint 2>/dev/null || true

  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_KEY: base64:testkey12345678901234567890123456789012=
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite
          coverage: none
      - name: Get Composer cache
        uses: actions/cache@v4
        with:
          path: Install/vendor
          key: composer-${{ hashFiles('Install/composer.lock') }}
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit / Vitest
        run: |
          (cd Install && php artisan test --parallel 2>/dev/null) || (cd Install && ./vendor/bin/pest 2>/dev/null) || true
          (cd Install && npm run test:run 2>/dev/null) || true

  build:
    runs-on: ubuntu-latest
    needs: [lint-php, lint-js]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Install/package-lock.json
      - name: Composer install
        run: composer install --no-dev --no-interaction --prefer-dist
        working-directory: Install
      - name: NPM ci + build
        working-directory: Install
        run: npm ci && npm run build
      - name: Artisan optimize
        run: php artisan config:cache && php artisan route:cache && php artisan view:cache 2>/dev/null || true
        working-directory: Install

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Get Composer cache
        uses: actions/cache@v4
        with:
          path: Install/vendor
          key: composer-${{ hashFiles('Install/composer.lock') }}
      - name: Install deps
        run: composer install --no-interaction --prefer-dist
        working-directory: Install
      - name: Audit Composer
        run: composer audit 2>/dev/null || true
        working-directory: Install
      - name: NPM audit (optional)
        working-directory: Install
        run: npm audit --audit-level=high 2>/dev/null || true
