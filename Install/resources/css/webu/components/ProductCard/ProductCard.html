<!-- Webu Product Card – default -->
<article class="webu-product-card">
  <a href="/product/slug" class="webu-product-card__image-wrap">
    <img src="..." alt="Product" class="webu-product-card__image" />
    <span class="webu-product-card__badge">New</span>
  </a>
  <div class="webu-product-card__body">
    <h3 class="webu-product-card__title">Product Name</h3>
    <div class="webu-product-card__rating">★ 4.5</div>
    <p class="webu-product-card__price">49.99 GEL</p>
  </div>
  <div class="webu-product-card__actions"><button>Add to cart</button></div>
</article>

<!-- Variants: add class webu-product-card--classic | --minimal | --modern | --premium | --compact -->
