<!-- Webu Banner (without image) -->
<section class="webu-banner">
  <div class="webu-banner__inner">
    <h1 class="webu-hero__title">Limited offer</h1>
    <p class="webu-hero__subtitle">Free shipping on orders over 100 GEL.</p>
    <a href="/shop">Shop now</a>
  </div>
</section>

<!-- With background image (set --webu-banner-bg in style or JS) -->
<section class="webu-banner webu-banner--has-bg" style="--webu-banner-bg: url(https://example.com/bg.jpg);">
  <div class="webu-banner__inner">
    <h1 class="webu-hero__title">Summer Collection</h1>
    <p class="webu-hero__subtitle">New arrivals.</p>
    <a href="/shop">View collection</a>
  </div>
</section>
